spring.application.name=Vehical-Rental-Service-Platform

# JSP view resolution
spring.mvc.view.prefix=/
spring.mvc.view.suffix=.jsp

# File handling configuration
admin.staff.storage.file=admins.txt
admin.staff.activity.file=admin-activity.log

# MySQL configuration
spring.datasource.url=jdbc:mysql://localhost:3306/vehicle_rental_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Logging (optional)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE