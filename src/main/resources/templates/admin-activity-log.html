<!DOCTYPE html>
<html class="dark" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>DriveEase - Activity Logs</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                  "primary-container": "#1c1b1b", "on-surface-variant": "#444748", "tertiary-fixed": "#d8e2ff",
                  "on-primary": "#ffffff", "error": "#ba1a1a", "surface-dim": "#d9dadc", "primary": "#000000",
                  "surface-container-low": "#f3f3f5", "tertiary-container": "#001a41", "error-container": "#ffdad6",
                  "surface": "#f9f9fb", "on-tertiary-container": "#2480ff", "on-surface": "#1a1c1d",
                  "on-primary-fixed": "#1c1b1b", "on-primary-container": "#858383"
              },
              fontFamily: {
                  "headline-md": ["Hanken Grotesk"], "display-xl": ["Hanken Grotesk"], "headline-lg-mobile": ["Hanken Grotesk"],
                  "body-md": ["Inter"], "body-lg": ["Inter"], "headline-lg": ["Hanken Grotesk"], "label-md": ["Inter"], "label-sm": ["Inter"]
              }
            }
          }
        }
    </script>
</head>

<body class="bg-surface dark:bg-[#0A0A0A] text-on-surface dark:text-on-primary font-body-md text-body-md antialiased min-h-screen flex">

<div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

<main class="flex-1 ml-0 md:ml-64 min-h-screen flex flex-col bg-[#0A0A0A]">

    <div th:replace="~{fragments/admin-topbar :: topbar}"></div>

    <div class="flex-1 p-margin-mobile md:p-margin-desktop max-w-container-max mx-auto w-full p-8">

        <div class="mb-8 flex justify-between items-end">
            <div>
                <h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-primary mb-2">System Activity Logs</h2>
                <p class="font-body-md text-body-md text-on-primary-container">Monitor platform actions, security events, and user behavior.</p>
            </div>
        </div>

        <div class="bg-[#1C1C1E] rounded-xl overflow-hidden shadow-2xl border border-on-surface-variant/10">
            <div class="p-6 border-b border-on-surface-variant/20 flex justify-between items-center bg-[#0A0A0A]/30">
                <h3 class="font-label-md text-label-md text-on-primary flex items-center gap-2">
                    <span class="material-symbols-outlined text-on-tertiary-container">history</span>
                    Recent Operations
                </h3>
            </div>

            <div class="p-0 overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                    <tr class="border-b border-on-surface-variant/20 bg-[#0A0A0A]/80">
                        <th class="p-4 font-label-sm text-label-sm text-on-primary-container font-semibold uppercase tracking-wider">Timestamp</th>
                        <th class="p-4 font-label-sm text-label-sm text-on-primary-container font-semibold uppercase tracking-wider">Actor</th>
                        <th class="p-4 font-label-sm text-label-sm text-on-primary-container font-semibold uppercase tracking-wider">Action</th>
                        <th class="p-4 font-label-sm text-label-sm text-on-primary-container font-semibold uppercase tracking-wider">Details</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(logs)}">
                        <td colspan="4" class="p-8 text-center text-on-primary-container">
                            <div class="flex flex-col items-center gap-3">
                                <span class="material-symbols-outlined text-4xl opacity-50">data_alert</span>
                                <p>No activity logs recorded yet.</p>
                            </div>
                        </td>
                    </tr>

                    <tr th:each="log : ${logs}" class="border-b border-on-surface-variant/10 hover:bg-[#2A2A2C] transition-colors group">

                        <td class="p-4 font-mono text-sm text-on-surface-variant whitespace-nowrap" th:text="${log.timestamp}"></td>

                        <td class="p-4">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-surface-variant/10 flex items-center justify-center border border-on-surface-variant/20">
                                    <span class="material-symbols-outlined text-on-primary-container text-sm">person</span>
                                </div>
                                <span class="font-label-md text-label-md text-on-primary" th:text="${log.actor}"></span>
                            </div>
                        </td>

                        <td class="p-4 font-label-md text-label-md text-tertiary-fixed" th:text="${log.action}"></td>

                        <td class="p-4 font-body-sm text-sm text-on-primary-container opacity-80 group-hover:opacity-100 transition-opacity" th:text="${log.details}"></td>

                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</main>
</body>
</html>
