<!DOCTYPE html>
<html class="dark" lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>DriveEase - Edit Staff/Admin</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                  "primary-container": "#1c1b1b", "on-surface-variant": "#444748", "tertiary-fixed": "#d8e2ff",
                  "on-primary": "#ffffff", "error": "#ba1a1a", "surface-dim": "#d9dadc", "primary": "#000000",
                  "surface-container-low": "#f3f3f5", "tertiary-container": "#001a41", "error-container": "#ffdad6",
                  "surface": "#f9f9fb", "on-tertiary-container": "#2480ff", "on-surface": "#1a1c1d",
                  "on-primary-fixed": "#1c1b1b", "on-primary-container": "#858383"
              },
              fontFamily: {
                  "headline-md": ["Hanken Grotesk"], "display-xl": ["Hanken Grotesk"], "headline-lg-mobile": ["Hanken Grotesk"],
                  "body-md": ["Inter"], "body-lg": ["Inter"], "headline-lg": ["Hanken Grotesk"], "label-md": ["Inter"], "label-sm": ["Inter"]
              }
            }
          }
        }
    </script>
</head>

<body class="bg-surface dark:bg-[#0A0A0A] text-on-surface dark:text-on-primary font-body-md text-body-md antialiased min-h-screen flex">

<div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

<main class="flex-1 ml-0 md:ml-64 min-h-screen flex flex-col bg-[#0A0A0A]">

    <div th:replace="~{fragments/admin-topbar :: topbar}"></div>

    <div class="flex-1 p-margin-mobile md:p-margin-desktop max-w-container-max mx-auto w-full p-8">

        <div class="mb-8">
            <h2 class="font-headline-lg-mobile md:font-headline-lg text-headline-lg-mobile md:text-headline-lg text-on-primary mb-2">Edit Account Information</h2>
            <p class="font-body-md text-body-md text-on-primary-container">Modify settings, credentials, and organizational permissions for this user.</p>
        </div>

        <div class="bg-[#1C1C1E] rounded-xl p-8 max-w-2xl border border-on-surface-variant/20 shadow-2xl">

            <form th:action="@{/updateAdminStaff}" method="post" class="flex flex-col gap-6">

                <input type="hidden" name="userId" th:value="${userId}" />

                <div>
                    <label class="block font-label-sm text-label-sm text-on-primary-container mb-2 uppercase tracking-wider">Account User ID</label>
                    <input type="text" th:value="${userId}" disabled
                           class="w-full bg-[#0A0A0A] border border-on-surface-variant/10 rounded-lg px-4 py-3 text-on-surface-variant cursor-not-allowed font-mono text-sm">
                </div>

                <div>
                    <label class="block font-label-sm text-label-sm text-on-primary-container mb-2 uppercase tracking-wider">Full Name</label>
                    <input type="text" name="fullName" th:value="${fullName}" required
                           class="w-full bg-[#0A0A0A] border border-on-surface-variant/20 rounded-lg px-4 py-3 text-on-primary placeholder:text-on-surface-variant focus:outline-none focus:border-on-tertiary-container focus:ring-1 focus:ring-on-tertiary-container transition-colors">
                </div>

                <div>
                    <label class="block font-label-sm text-label-sm text-on-primary-container mb-2 uppercase tracking-wider">Username</label>
                    <input type="text" name="username" th:value="${username}" required
                           class="w-full bg-[#0A0A0A] border border-on-surface-variant/20 rounded-lg px-4 py-3 text-on-primary placeholder:text-on-surface-variant focus:outline-none focus:border-on-tertiary-container focus:ring-1 focus:ring-on-tertiary-container transition-colors">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block font-label-sm text-label-sm text-on-primary-container mb-2 uppercase tracking-wider">System Role</label>
                        <select name="role" required
                                class="w-full bg-[#0A0A0A] border border-on-surface-variant/20 rounded-lg px-4 py-3 text-on-primary focus:outline-none focus:border-on-tertiary-container focus:ring-1 focus:ring-on-tertiary-container transition-colors appearance-none">
                            <option value="ADMIN" th:selected="${role == 'ADMIN'}">ADMIN</option>
                            <option value="STAFF" th:selected="${role == 'STAFF'}">STAFF</option>
                        </select>
                    </div>
                    <div>
                        <label class="block font-label-sm text-label-sm text-on-primary-container mb-2 uppercase tracking-wider">Employment Type</label>
                        <select name="employeeType" required
                                class="w-full bg-[#0A0A0A] border border-on-surface-variant/20 rounded-lg px-4 py-3 text-on-primary focus:outline-none focus:border-on-tertiary-container focus:ring-1 focus:ring-on-tertiary-container transition-colors appearance-none">
                            <option value="FULL_TIME" th:selected="${employeeType == 'FULL_TIME'}">FULL_TIME</option>
                            <option value="PART_TIME" th:selected="${employeeType == 'PART_TIME'}">PART_TIME</option>
                            <option value="CONTRACT" th:selected="${employeeType == 'CONTRACT'}">CONTRACT</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block font-label-sm text-label-sm text-on-primary-container mb-2 uppercase tracking-wider">Update Password</label>
                    <input type="password" name="password" placeholder="Leave blank to keep current password"
                           class="w-full bg-[#0A0A0A] border border-on-surface-variant/20 rounded-lg px-4 py-3 text-on-primary placeholder:text-on-surface-variant focus:outline-none focus:border-on-tertiary-container focus:ring-1 focus:ring-on-tertiary-container transition-colors">
                </div>

                <div class="h-px w-full bg-on-surface-variant/20 my-2"></div>

                <div class="flex items-center gap-4 pt-2">
                    <button type="submit"
                            class="bg-on-primary text-primary-container font-label-md text-label-md py-3 px-8 rounded-lg hover:scale-[1.02] active:scale-95 transition-all duration-200">
                        Save Changes
                    </button>
                    <a th:href="@{/admin/dashboard}"
                       class="border border-on-surface-variant/30 text-on-primary-container hover:text-on-primary hover:bg-[#2A2A2C] font-label-md text-label-md py-3 px-6 rounded-lg transition-all duration-200">
                        Cancel
                    </a>
                </div>

            </form>
        </div>

    </div>
</main>
</body>
</html>
