<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveEase - Edit Staff/Admin</title>

    <link rel="stylesheet" href="/css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

<main class="main-content">
    <div th:replace="~{fragments/admin-topbar :: topbar}"></div>

    <div class="page-header">
        <h2>Edit Account Information</h2>
        <p>Modify settings, credentials, and organizational permissions for this user.</p>
    </div>

    <div class="form-card">
        <form th:action="@{/updateAdminStaff}" method="post">

            <input type="hidden" name="userId" th:value="${userId}" />

            <div class="form-group">
                <label class="form-label">Account User ID</label>
                <input type="text" th:value="${userId}" disabled class="form-control" style="font-family: monospace;">
            </div>

            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" name="fullName" th:value="${fullName}" required class="form-control">
            </div>

            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" th:value="${username}" required class="form-control">
            </div>

            <div class="form-row">
                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label">System Role</label>
                    <select name="role" required class="form-control">
                        <option value="ADMIN" th:selected="${role == 'ADMIN'}">ADMIN</option>
                        <option value="STAFF" th:selected="${role == 'STAFF'}">STAFF</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label class="form-label">Employment Type</label>
                    <select name="employeeType" required class="form-control">
                        <option value="FULL_TIME" th:selected="${employeeType == 'FULL_TIME'}">FULL_TIME</option>
                        <option value="PART_TIME" th:selected="${employeeType == 'PART_TIME'}">PART_TIME</option>
                        <option value="CONTRACT" th:selected="${employeeType == 'CONTRACT'}">CONTRACT</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Update Password</label>
                <input type="password" name="password" placeholder="Leave blank to keep current password" class="form-control">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary" style="padding: 12px 24px;">Save Changes</button>
                <a th:href="@{/admin/dashboard}" class="btn btn-secondary" style="padding: 12px 24px;">Cancel</a>
            </div>

        </form>
    </div>
</main>
</body>
</html>
