<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Booking History</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<input type="hidden" id="loggedInUsername" th:value="${username}" />
<div class="page-wrapper">
    <div class="status-area">
        <div>
            <h1>Your Rental History</h1>
            <p class="text-muted">Manage all active and past vehicle reservations.</p>
        </div>
        <a href="/bookVehicle.html" class="button">Book New Vehicle</a>
    </div>

    <div class="report-card">
        <div class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Customer</th>
                    <th>Vehicle</th>
                    <th>Start Date</th>
                    <th>Return Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody id="bookingTableBody">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="/js/history.js?v=2"></script>
</body>
</html>
