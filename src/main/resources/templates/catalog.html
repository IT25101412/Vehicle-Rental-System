<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vehicle Catalog</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* A simple grid for the catalog cards */
        #catalogGrid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
        .vehicle-card {
            border: 1px solid #ccc;
            padding: 15px;
            width: 250px;
            text-align: center;
            border-radius: 8px;
        }
        .vehicle-card img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Available Vehicles</h1>

    <label for="typeFilter"><strong>Filter by Type:</strong></label>
    <select id="typeFilter" onchange="loadCatalog()">
        <option value="ALL">All Vehicles</option>
        <option value="CAR">Cars</option>
        <option value="MOTORCYCLE">Motorcycles</option>
        <option value="SUV">SUVs</option>
        <option value="VAN">Vans</option>
    </select>

    <div id="catalogGrid"></div>
</div>

<script src="/js/catalog.js"></script>
</body>
</html>
