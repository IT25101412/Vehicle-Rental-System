<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vehicle Catalog</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="page-wrapper">

    <header>
        <h1>Available Vehicles</h1>
        <p class="text-muted">Browse our selection and find the perfect vehicle for your needs.</p>
    </header>

    <div class="card toolbar" style="display: flex; align-items: center; gap: 16px;">
        <label for="typeFilter" style="margin-bottom: 0;">Filter by Type:</label>
        <select id="typeFilter" onchange="loadCatalog()" style="width: auto; min-width: 200px; padding: 10px 16px;">
            <option value="ALL">All Vehicles</option>
            <option value="CAR">Cars</option>
            <option value="MOTORCYCLE">Motorcycles</option>
            <option value="SUV">SUVs</option>
            <option value="VAN">Vans</option>
        </select>
    </div>

    <div id="catalogGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; margin-top: 24px;">
    </div>

</div>

<script src="/js/catalog.js"></script>
</body>
</html>
