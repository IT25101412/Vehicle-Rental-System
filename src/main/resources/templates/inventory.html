<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - Vehicle Inventory</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="page-wrapper">
    <header>
        <h1>Vehicle Inventory Management</h1>
        <p class="text-muted">Manage your fleet, update details, and remove vehicles.</p>
    </header>

    <div class="card">
        <div class="toolbar" style="justify-content: flex-end; margin-bottom: 20px;">
            <button class="button" onclick="window.location.href='/vehicleForm'">
                + Add New Vehicle
            </button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                <tr>
                    <th>Image</th>
                    <th>ID</th>
                    <th>Make & Model</th>
                    <th>Type</th>
                    <th>Rate / Day</th>
                    <th>Status</th>
                    <th style="text-align: right;">Actions</th>
                </tr>
                </thead>
                <tbody id="inventoryBody">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="/js/inventory.js"></script>
</body>
</html>
