<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveEase - Vehicle Form</title>

    <link rel="stylesheet" href="/css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/admin-sidebar :: sidebar}"></div>

<main class="main-content">

    <div class="page-header">
        <h2 id="formTitle">Add New Vehicle</h2>
        <p>Enter the details below to add or update a vehicle in your fleet.</p>
    </div>

    <div class="form-card" style="max-width: 900px;">
        <form id="vehicleForm">

            <h3 style="border-bottom: 1px solid var(--border-subtle); padding-bottom: 8px; margin-bottom: 20px; font-size: 1.1rem;">Vehicle Classification</h3>
            <div class="form-row">
                <div class="form-group">
                    <label for="type" class="form-label">Vehicle Type</label>
                    <select id="type" onchange="toggleFields()" required class="form-control">
                        <option value="CAR">Car</option>
                        <option value="MOTORCYCLE">Motorcycle</option>
                        <option value="SUV">SUV</option>
                        <option value="VAN">Van</option>
                    </select>
                </div>
            </div>

            <h3 style="border-bottom: 1px solid var(--border-subtle); padding-bottom: 8px; margin-bottom: 20px; margin-top: 2rem; font-size: 1.1rem;">Basic Details</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="make" class="form-label">Make</label>
                    <input type="text" id="make" placeholder="e.g., Toyota" required class="form-control">
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="model" class="form-label">Model</label>
                    <input type="text" id="model" placeholder="e.g., Corolla" required class="form-control">
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="year" class="form-label">Manufacture Year</label>
                    <input type="text" id="year" placeholder="e.g., 2022" required class="form-control">
                </div>
            </div>
            <div class="form-group">
                <label for="imageUpload" class="form-label">Vehicle Photo</label>
                <input type="file" id="imageUpload" accept="image/*" required class="form-control" style="background: rgba(255,255,255,0.02); padding: 9px;">
            </div>

            <h3 style="border-bottom: 1px solid var(--border-subtle); padding-bottom: 8px; margin-bottom: 20px; margin-top: 2rem; font-size: 1.1rem;">Performance & Pricing</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem;">
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="rate" class="form-label">Daily Rate (LKR)</label>
                    <input type="number" id="rate" placeholder="e.g., 5000" step="0.01" required class="form-control">
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="fuel" class="form-label">Fuel Type</label>
                    <input type="text" id="fuel" placeholder="e.g., Petrol / Diesel" required class="form-control">
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="mileage" class="form-label">Current Mileage</label>
                    <input type="number" id="mileage" placeholder="e.g., 15000" step="0.1" required class="form-control">
                </div>
            </div>

            <h3 style="border-bottom: 1px solid var(--border-subtle); padding-bottom: 8px; margin-bottom: 20px; margin-top: 2rem; font-size: 1.1rem;">Additional Specifications</h3>
            <div class="form-row">
                <div id="seatsGroup" class="form-group" style="margin-bottom: 0;">
                    <label for="seats" class="form-label">Number of Seats</label>
                    <input type="number" id="seats" placeholder="e.g., 5" class="form-control">
                </div>
                <div id="driveTrainGroup" class="form-group" style="margin-bottom: 0;">
                    <label for="driveTrain" class="form-label">Drive Train</label>
                    <input type="text" id="driveTrain" placeholder="e.g., 4WD/AWD" class="form-control">
                </div>
                <div id="motoGroup" class="form-group" style="display:none; margin-bottom: 0;">
                    <label for="motoType" class="form-label">Motorcycle Type</label>
                    <input type="text" id="motoType" placeholder="e.g., Standard / Scooter" class="form-control">
                </div>
            </div>

            <div class="form-actions" style="justify-content: flex-end;">
                <button type="button" onclick="window.location.href='/inventory'" class="btn btn-secondary" style="padding: 12px 24px;">Cancel</button>
                <button type="button" onclick="submitVehicleForm()" class="btn btn-primary" style="padding: 12px 24px;">Save Vehicle</button>
            </div>

        </form>
    </div>

</main>

<script src="/js/vehicleForm.js"></script>
</body>
</html>
