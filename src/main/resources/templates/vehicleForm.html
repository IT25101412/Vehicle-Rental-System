<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vehicle Management - Form</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="page-wrapper">
    <header>
        <h1 id="formTitle">Add New Vehicle</h1>
        <p class="text-muted">Enter the details below to add or update a vehicle in your fleet.</p>
    </header>

    <div class="form-card">
        <form id="vehicleForm">

            <div class="form-section">
                <div class="form-group" style="margin-bottom: 24px;">
                    <label for="type">Vehicle Type</label>
                    <select id="type" onchange="toggleFields()" required style="width: 100%;">
                        <option value="CAR">Car</option>
                        <option value="MOTORCYCLE">Motorcycle</option>
                        <option value="SUV">SUV</option>
                        <option value="VAN">Van</option>
                    </select>
                </div>
            </div>

            <div class="form-section">
                <h3>Basic Details</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="make">Make</label>
                        <input type="text" id="make" placeholder="e.g., Toyota" required style="width: 100%;">
                    </div>
                    <div class="form-group">
                        <label for="model">Model</label>
                        <input type="text" id="model" placeholder="e.g., Corolla" required style="width: 100%;">
                    </div>
                    <div class="form-group">
                        <label for="year">Manufacture Year</label>
                        <input type="text" id="year" placeholder="e.g., 2022" required style="width: 100%;">
                    </div>
                    <div class="form-group">
                        <label for="imageUpload">Vehicle Photo</label>
                        <input type="file" id="imageUpload" accept="image/*" required style="width: 100%; padding: 10px 16px;">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <h3>Performance & Pricing</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label for="rate">Daily Rental Rate (LKR)</label>
                        <input type="number" id="rate" placeholder="e.g., 5000" step="0.01" required style="width: 100%;">
                    </div>
                    <div class="form-group">
                        <label for="fuel">Fuel Type</label>
                        <input type="text" id="fuel" placeholder="e.g., Petrol / Diesel" required style="width: 100%;">
                    </div>
                    <div class="form-group">
                        <label for="mileage">Current Mileage (km)</label>
                        <input type="number" id="mileage" placeholder="e.g., 15000" step="0.1" required style="width: 100%;">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-row">
                    <div class="form-group" id="seatsGroup">
                        <label for="seats">Number of Seats</label>
                        <input type="number" id="seats" placeholder="e.g., 5" style="width: 100%;">
                    </div>
                    <div class="form-group" id="driveTrainGroup">
                        <label for="driveTrain">Drive Train</label>
                        <input type="text" id="driveTrain" placeholder="e.g., 4WD/AWD" style="width: 100%;">
                    </div>
                    <div class="form-group" id="motoGroup" style="display:none;">
                        <label for="motoType">Motorcycle Type</label>
                        <input type="text" id="motoType" placeholder="e.g., Standard / Scooter" style="width: 100%;">
                    </div>
                </div>
            </div>

            <div class="action-buttons" style="margin-top: 32px;">
                <button type="button" class="button secondary" onclick="window.location.href='/inventory'">Cancel</button>
                <button type="button" class="button" onclick="submitVehicleForm()">Save Vehicle</button>
            </div>

        </form>
    </div>
</div>

<script src="/js/vehicleForm.js"></script>
</body>
</html>
