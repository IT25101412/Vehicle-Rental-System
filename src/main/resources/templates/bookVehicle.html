<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book a Vehicle</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="page-wrapper">
    <header>
        <h1>Create a New Booking</h1>
        <p class="text-muted">Enter the details below to reserve a vehicle.</p>
    </header>

    <div th:if="${errorMessage}" style="background-color: #f8d7da; color: #842029; padding: 15px; border-radius: 12px; margin-bottom: 20px; font-weight: 600; text-align: center;">
        <span th:text="${errorMessage}"></span>
    </div>

    <div class="form-card">
        <form action="/createBooking" method="POST">

            <div class="form-section">
                <div class="form-row">
                    <div>
                        <label>Customer Name</label>
                        <input type="text" name="customerUsername" th:value="${username}" readonly required style="width: 100%;">
                    </div>
                    <div>
                        <label>Vehicle ID</label>
                        <div style="display: flex; align-items: center; background-color: #f8fafc; border: 1px solid #cbd2d9; border-radius: 12px; padding: 6px 8px 6px 16px;">

                            <input type="text" name="vehicleId" th:value="${vehicleId}" readonly required
                                   style="flex: 1; border: none; background: transparent; padding: 0; margin: 0; color: #64748b; outline: none; box-shadow: none; min-width: 0;">

                            <a href="/catalog" class="button secondary"
                               style="padding: 8px 16px; margin: 0; min-width: 0; font-size: 0.85rem; border-radius: 8px; white-space: nowrap; height: auto; line-height: 1.5;">
                                Change
                            </a>

                        </div>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-row">
                    <div>
                        <label>Start Date</label>
                        <input type="date" id="startDateBox" name="startDate" required style="width: 100%;">
                    </div>
                    <div>
                        <label>Return Date</label>
                        <input type="date" id="returnDateBox" name="returnDate" required style="width: 100%;">
                    </div>
                </div>
            </div>

            <div class="action-buttons" style="margin-top: 24px;">
                <a href="/reservationHistory" class="button secondary">View My History</a>

                <button type="submit" class="button">Book Now</button>
            </div>
        </form>
    </div>
</div>
<script>
    const startDateInput = document.getElementById('startDateBox');
    const returnDateInput = document.getElementById('returnDateBox');

    const today = new Date().toISOString().split('T')[0];

    startDateInput.setAttribute('min', today);
    returnDateInput.setAttribute('min', today);

    startDateInput.addEventListener('change', function() {

        returnDateInput.setAttribute('min', this.value);

        if (returnDateInput.value && returnDateInput.value < this.value) {
            returnDateInput.value = this.value;
        }
    });
</script>
</body>
</html>
