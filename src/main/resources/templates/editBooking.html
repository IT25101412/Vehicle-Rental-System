<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Booking</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="page-wrapper">
    <header>
        <h1>Update Your Reservation</h1>
        <p class="text-muted">Modify the dates of your booking. To change vehicles, please cancel and create a new reservation.</p>
    </header>

    <div th:if="${errorMessage}" style="background-color: #f8d7da; color: #842029; padding: 15px; border-radius: 12px; margin-bottom: 20px; font-weight: 600; text-align: center;">
        <span th:text="${errorMessage}"></span>
    </div>

    <div class="form-card">
        <form action="/updateBooking" method="POST">

            <input type="hidden" id="transactionIdBox" name="transactionId" required>

            <div class="form-section">
                <div class="form-row">
                    <div>
                        <label>Vehicle ID</label>
                        <input type="text" id="vehicleIdBox" name="vehicleId" required readonly
                               style="width: 100%; background-color: #f8fafc; color: #64748b; cursor: not-allowed;">
                    </div>
                    <div></div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-row">
                    <div>
                        <label>New Start Date</label>
                        <input type="date" id="startDateBox" name="startDate" required style="width: 100%;">
                    </div>
                    <div>
                        <label>New Return Date</label>
                        <input type="date" id="returnDateBox" name="returnDate" required style="width: 100%;">
                    </div>
                </div>
            </div>

            <div class="action-buttons" style="margin-top: 24px;">
                <a href="/reservationHistory" class="button secondary">Cancel</a>
                <button type="submit" class="button">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);

    if(urlParams.get('id')) document.getElementById('transactionIdBox').value = urlParams.get('id');
    if(urlParams.get('vehicle')) document.getElementById('vehicleIdBox').value = urlParams.get('vehicle');
    if(urlParams.get('start')) document.getElementById('startDateBox').value = urlParams.get('start');
    if(urlParams.get('end')) document.getElementById('returnDateBox').value = urlParams.get('end');
</script>
</body>
</html>
