<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Update Booking</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="page-wrapper">
    <header>
        <h1>Update Your Reservation</h1>
        <p class="text-muted">You can only modify dates while this booking is still pending.</p>
    </header>

    <div class="form-card">
        <form action="/updateBooking" method="POST">

            <div class="form-section">
                <div class="form-row">
                    <div>
                        <label>Transaction ID</label>
                        <input type="text"
                               name="transactionId"
                               th:value="${transactionId}"
                               required
                               readonly
                               style="width: 100%; background-color: #f1f5f9;">
                    </div>
                    <div>
                        <label>Vehicle ID</label>
                        <input type="text"
                               th:value="${vehicleId}"
                               readonly
                               style="width: 100%; background-color: #f1f5f9;">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-row">
                    <div>
                        <label>New Start Date</label>
                        <input type="date"
                               name="startDate"
                               th:value="${startDate}"
                               required
                               style="width: 100%;">
                    </div>
                    <div>
                        <label>New Return Date</label>
                        <input type="date"
                               name="returnDate"
                               th:value="${returnDate}"
                               required
                               style="width: 100%;">
                    </div>
                </div>
            </div>

            <div th:if="${error == 'pastStartDate'}" style="color: #b91c1c; margin-top: 16px; font-weight: 600;">
                Start date cannot be in the past.
            </div>

            <div th:if="${error == 'invalidReturnDate'}" style="color: #b91c1c; margin-top: 16px; font-weight: 600;">
                Return date must be after the start date.
            </div>

            <div th:if="${error == 'invalidDateFormat'}" style="color: #b91c1c; margin-top: 16px; font-weight: 600;">
                Please select valid booking dates.
            </div>

            <div class="action-buttons" style="margin-top: 24px;">
                <a href="/reservationHistory" class="button secondary">Cancel</a>
                <button type="submit" class="button">Save Changes</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
