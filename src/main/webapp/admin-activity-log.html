<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Activity Log</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0">Admin Activity Logs</h2>
        <a th:href="@{/admin-dashboard.html}" class="btn btn-outline-dark">Back to Dashboard</a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Actor</th>
                    <th>Action</th>
                    <th>Details</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(logs)}">
                    <td colspan="4" class="text-center py-3">No activity logs found.</td>
                </tr>
                <tr th:each="log : ${logs}">
                    <td th:text="${log.timestamp}"></td>
                    <td th:text="${log.actor}"></td>
                    <td th:text="${log.action}"></td>
                    <td th:text="${log.details}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
